# LVGL for UI
lvgl:
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  buffer_size: 25%
  log_level: INFO
  color_depth: 16
  bg_color: 0x000033  # Dark blue background
  
  # Define styles
  style_definitions:
    - id: style_title
      text_font: montserrat_28
      text_color: 0xFFFFFF
      bg_opa: TRANSP
    - id: style_body
      text_font: montserrat_20
      text_color: 0x00FF00
      bg_opa: TRANSP

  # Main page
  pages:
    - id: main_page
      widgets:
        # Title text
        - label:
            align: TOP_MID
            y: 60
            styles: style_title
            text: "Hello World!"
        
        # Status text
        - label:
            align: CENTER
            y: -20
            styles: style_body
            text: "ESP32-S3-Touch-LCD-1.85C"
        
        # Subtitle
        - label:
            align: CENTER
            y: 20
            text_font: montserrat_16
            text_color: 0xAAAAAA
            text: "Display Working!"
        
        # WiFi status
        - label:
            id: lbl_wifi
            align: BOTTOM_MID
            y: -60
            text_font: montserrat_14
            text_color: 0xFFFF00
            text: "Connecting..."

# WiFi info text sensor
text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_wifi
              text_color: 0x00FF00
              text: !lambda 'return "IP: " + x;'

# Update WiFi label when connected
interval:
  - interval: 5s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lvgl.label.update:
                id: lbl_wifi
                text_color: 0x00FF00
                text: !lambda 'return "IP: " + id(wifi_ip).state;'
          else:
            - lvgl.label.update:
                id: lbl_wifi
                text_color: 0xFF0000
                text: "WiFi: Disconnected"

# Touchscreen (CST816 at 0x15)
touchscreen:
  platform: cst816
  id: my_touchscreen
  address: 0x15
  interrupt_pin: GPIO4
  on_touch:
    - logger.log: "Touch detected!"
    - light.turn_on: backlight_light
