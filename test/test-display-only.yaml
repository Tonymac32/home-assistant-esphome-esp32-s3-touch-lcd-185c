# Test config with LVGL text - using working Waveshare settings
# For ESP32-S3-Touch-LCD-1.85C
esphome:
  name: test-display
  friendly_name: Test Display

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Test-Display-AP"
    password: "testpassword123"

captive_portal:

# I2C bus for PCA9554 and touch
i2c:
  sda: GPIO11
  scl: GPIO10
  scan: true

# PCA9554 I/O expander (for display reset pin)
pca9554:
  - id: 'pca9554_device'
    address: 0x20

# Backlight - GPIO5
output:
  - platform: ledc
    pin: GPIO5
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Backlight"
    id: backlight_light
    restore_mode: ALWAYS_ON

# QSPI bus for display
spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  data_pins: [GPIO46, GPIO45, GPIO42, GPIO41]

# Display with WORKING settings from Waveshare official demo
display:
  - platform: qspi_dbi
    model: CUSTOM
    data_rate: 80MHz
    id: main_display
    spi_id: display_qspi
    color_order: rgb
    invert_colors: true
    dimensions:
      height: 360
      width: 360
    cs_pin: GPIO21
    reset_pin:
      pca9554: pca9554_device
      number: 2  # EXIO2 - critical for 1.85C variant!
    auto_clear_enabled: false  # Must be false when using LVGL
    update_interval: never  # LVGL handles updates
    # Official Waveshare init sequence for 1.85C
    init_sequence:
      - [0xF0, 0x28]
      - [0xF2, 0x28]
