# Test config with OFFICIAL Waveshare init sequence
# From: ESP32-S3-Touch-LCD-1.85-Demo/ESP-IDF/main/LCD_Driver/ST77916.c
esphome:
  name: test-waveshare
  friendly_name: Test Waveshare Official

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Test-Waveshare-AP"
    password: "testpassword123"

captive_portal:

# Single I2C bus
i2c:
  sda: GPIO11
  scl: GPIO10
  scan: true

# PCA9554 I/O expander - address 0x20 (confirmed from logs)
pca9554:
  - id: 'pca9554_device'
    address: 0x20

# QSPI bus for display
spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  data_pins:
    - GPIO46
    - GPIO45
    - GPIO42
    - GPIO41

# Backlight control
output:
  - platform: ledc
    pin: GPIO5
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: 'Backlight'
    id: backlight_light
    restore_mode: ALWAYS_ON

# Display - using OFFICIAL Waveshare init sequence
display:
  - platform: qspi_dbi
    model: CUSTOM
    data_rate: 80MHz
    id: main_display
    spi_id: display_qspi
    color_order: rgb
    invert_colors: true
    dimensions:
      height: 360
      width: 360
    cs_pin: GPIO21
    reset_pin:
      pca9554: pca9554_device
      number: 2  # EXIO2 as per official demo
    auto_clear_enabled: true
    update_interval: 1s
    lambda: |-
      it.fill(Color(0, 255, 0));  // Fill with GREEN - should now be correct!
    # Official Waveshare init sequence from vendor_specific_init_new[]
    init_sequence:
      - [0xF0, 0x28]
      - [0xF2, 0x28]
      - [0x73, 0xF0]
      - [0x7C, 0xD1]
      - [0x83, 0xE0]
      - [0x84, 0x61]
      - [0xF2, 0x82]
