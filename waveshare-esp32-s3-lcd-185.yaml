# Waveshare ESP32-S3-Touch-LCD-1.85C - Full Configuration
# With Voice Assistant, Touch, LVGL UI, and Wake Word

# FLIP DISPLAY search for FLIP DISPLAY, and change 3 values for 180 degree flip

substitutions:
  wake_word_phrase: !secret wake_word_phrase
  version: "1.1.0"

esphome:
  name: esp32-s3-touch-lcd-185
  friendly_name: ESP32-S3 Touch LCD 1.85
  on_boot:
    priority: -100
    then:
      - delay: 5s
      # Initialize clock mode switch from restored global value
      - if:
          condition:
            lambda: 'return id(clock_mode);'
          then:
            - lvgl.widget.update:
                id: clock_mode_switch
                state:
                  checked: true
            - logger.log: "Clock mode restored: ON"
          else:
            - logger.log: "Clock mode restored: OFF"
      - if:
          condition:
            lambda: 'return !id(is_muted);'
          then:
            - logger.log: "Starting wake word on boot"
            - voice_assistant.start_continuous:

# Global variables
globals:
  - id: is_muted
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: display_on
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: ignore_touch
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: clock_mode
    type: bool
    restore_value: yes  # Persist across reboots
    initial_value: 'false'
  - id: in_screensaver
    type: bool
    restore_value: no
    initial_value: 'false'
# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  services:
    # Update weather display (called from HA automation)
    - service: set_weather
      variables:
        temperature: string
        condition: string
      then:
        - lvgl.label.update:
            id: lbl_weather_temp
            text: !lambda 'return temperature.c_str();'
        - lvgl.label.update:
            id: lbl_weather_cond
            text: !lambda 'return condition.c_str();'

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: 'ESP32-S3-Touch-LCD-185'
    password: !secret ap_password

captive_portal:

# Time from Home Assistant
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - logger.log: "Time synced from Home Assistant"
    on_time:
      # Update time display every minute
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_time
              text: !lambda |-
                auto time = id(ha_time).now();
                return time.strftime("%H:%M");
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                auto time = id(ha_time).now();
                return time.strftime("%a %d %b");
          # Also update screensaver time
          - lvgl.label.update:
              id: lbl_screensaver_time
              text: !lambda |-
                auto time = id(ha_time).now();
                return time.strftime("%H:%M");
          - lvgl.label.update:
              id: lbl_screensaver_date
              text: !lambda |-
                auto time = id(ha_time).now();
                return time.strftime("%a %d %b");

# ESP32-S3 configuration
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

# PSRAM configuration - CRITICAL for display
psram:
  mode: octal
  speed: 80MHz

# Web server
web_server:
  port: 80
  version: 2
  include_internal: true

# I2S Audio Configuration for Microphone and Speaker
i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO15
  - id: i2s_out
    i2s_lrclk_pin: GPIO38
    i2s_bclk_pin: GPIO48

# Speaker configuration
speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO47
    dac_type: external
    i2s_mode: primary

# Microphone configuration
microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO39
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit

# Media Player - CURRENTLY NOT SUPPORTED WITH ESP-IDF FRAMEWORK
# The i2s_audio media_player requires Arduino framework, but this display
# requires ESP-IDF for PSRAM/LVGL support. Uncomment below if/when ESPHome
# adds ESP-IDF support for media_player:
#
# media_player:
#   - platform: i2s_audio
#     id: esp_media_player
#     name: Media Player
#     i2s_audio_id: i2s_out
#     i2s_dout_pin: GPIO47
#     dac_type: external
#     mode: mono

# Voice Assistant configuration
# Wake word + push-to-talk both enabled
voice_assistant:
  id: va
  microphone: i2s_microphone
  speaker: i2s_speaker
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_wake_word_detected:
    - light.turn_on:
        id: display_backlight
        brightness: 100%
    - lvgl.resume:
  on_listening:
    - light.turn_on:
        id: display_backlight
        brightness: 100%
    - lvgl.resume:
    - lvgl.label.update:
        id: lbl_status
        text: "Listening..."
        text_color: 0x00FF00
    # Show green spinning ring
    - lvgl.spinner.update:
        id: voice_ring
        arc_color: 0x003300
        indicator:
          arc_color: 0x00FF00
    - lvgl.widget.show: voice_ring
  on_stt_end:
    - lvgl.label.update:
        id: lbl_status
        text: "Processing..."
        text_color: 0xFFFF00
    # Change ring to orange/yellow
    - lvgl.spinner.update:
        id: voice_ring
        arc_color: 0x332200
        indicator:
          arc_color: 0xFF6600
  on_tts_end:
    - light.turn_on:
        id: display_backlight
        brightness: 30%
    # Hide the ring
    - lvgl.widget.hide: voice_ring
    - if:
        condition:
          lambda: 'return id(is_muted);'
        then:
          - lvgl.label.update:
              id: lbl_status
              text: "Muted"
              text_color: 0xFF6600
        else:
          - lvgl.label.update:
              id: lbl_status
              text: "Ready"
              text_color: 0xFFFFFF
          - delay: 1s
          - voice_assistant.start_continuous:
  on_end:
    # Hide the ring
    - lvgl.widget.hide: voice_ring
    - if:
        condition:
          lambda: 'return !id(is_muted);'
        then:
          - delay: 1s
          - voice_assistant.start_continuous:
  on_error:
    # Show red ring briefly then hide
    - lvgl.spinner.update:
        id: voice_ring
        arc_color: 0x330000
        indicator:
          arc_color: 0xFF0000
    - lvgl.widget.show: voice_ring
    - delay: 2s
    - lvgl.widget.hide: voice_ring
    - if:
        condition:
          lambda: 'return id(is_muted);'
        then:
          - lvgl.label.update:
              id: lbl_status
              text: "Muted"
              text_color: 0xFF6600
        else:
          - lvgl.label.update:
              id: lbl_status
              text: "Ready"
              text_color: 0xFFFFFF
          - voice_assistant.start_continuous:
  on_client_connected:
    - lvgl.label.update:
        id: lbl_status
        text: "Connected"
        text_color: 0x00FF00

# Binary sensors (buttons)
# Note: Top physical button = GPIO0, Bottom physical button = Hardware Reset (EN pin)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: 'Side Button'
    filters:
      - delayed_on: 50ms   # Debounce
      - delayed_off: 50ms
    on_press:
      then:
        - light.turn_on:
            id: display_backlight
            brightness: 100%
        - lvgl.resume:
        - globals.set:
            id: display_on
            value: 'true'
        - if:
            condition:
              lambda: 'return id(is_muted);'
            then:
              # Currently muted - UNMUTE
              - logger.log: "Unmuting voice assistant"
              - globals.set:
                  id: is_muted
                  value: 'false'
              - lvgl.label.update:
                  id: lbl_status
                  text: "Ready"
                  text_color: 0xFFFFFF
              - voice_assistant.start_continuous:
            else:
              # Currently unmuted - MUTE
              - logger.log: "Muting voice assistant"
              - globals.set:
                  id: is_muted
                  value: 'true'
              - voice_assistant.stop:
              - lvgl.label.update:
                  id: lbl_status
                  text: "Muted"
                  text_color: 0xFF6600
  # Edge swipe zones for page navigation (narrow strips on left/right edges)
  - platform: touchscreen
    touchscreen_id: my_touchscreen
    id: swipe_left
    internal: true
    x_min: 0
    x_max: 60
    y_min: 100
    y_max: 260
    on_press:
      then:
        - lvgl.page.previous:
  - platform: touchscreen
    touchscreen_id: my_touchscreen
    id: swipe_right
    internal: true
    x_min: 300
    x_max: 360
    y_min: 100
    y_max: 260
    on_press:
      then:
        - lvgl.page.next:

# I2C bus - single bus (0x15, 0x20, 0x51 all found on this bus)
i2c:
  sda: GPIO11
  scl: GPIO10
  scan: true

# PCA9554 I/O expander (for display reset pin)
pca9554:
  - id: 'pca9554_device'
    address: 0x20

# Backlight output
output:
  - platform: ledc
    pin: GPIO5
    id: backlight

# Backlight light
light:
  - platform: monochromatic
    output: backlight
    id: display_backlight
    name: 'Display Backlight'
    restore_mode: ALWAYS_ON

# QSPI bus for display
spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  data_pins: [GPIO46, GPIO45, GPIO42, GPIO41]

# Display configuration - WORKING settings for 1.85C variant
display:
  - platform: qspi_dbi
    model: CUSTOM
    data_rate: 80MHz
    id: main_display
    spi_id: display_qspi
    color_order: rgb
    invert_colors: true
    dimensions:
      height: 360
      width: 360
    cs_pin: GPIO21
    reset_pin:
      pca9554: pca9554_device
      number: 1  # EXIO2 (chip IO 1) - critical for 1.85C variant!
    auto_clear_enabled: false
    update_interval: never
    # Official Waveshare init sequence for 1.85C
    init_sequence:
      - [0xF0, 0x28]
      - [0xF2, 0x28]
