# Touchscreen configuration (CST816 at 0x15)
touchscreen:
  platform: cst816
  id: my_touchscreen
  address: 0x15
  interrupt_pin: GPIO4
  reset_pin:
    pca9554: pca9554_device
    number: 0  # EXIO1 (chip IO 0)
  transform:
    mirror_x: true #FLIP DISPLAY change to true to flip display
    mirror_y: true #FLIP DISPLAY change to true to flip display
  on_touch:
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 100%
      - lvgl.resume:
      - globals.set:
          id: display_on
          value: 'true'
      # Clear ignore_touch flag on any touch
      - globals.set:
          id: ignore_touch
          value: 'false'
      # If in screensaver, go back to main page
      - if:
          condition:
            lambda: 'return id(in_screensaver);'
          then:
            - globals.set:
                id: in_screensaver
                value: 'false'
            - lvgl.page.show: main_page
      - if:
          condition:
            lambda: 'return !id(is_muted);'
          then:
            - delay: 500ms
            - voice_assistant.start_continuous:

# Custom fonts for large time display
font:
  - file: "gfonts://Montserrat"
    id: montserrat_48
    size: 48
  - file: "gfonts://Montserrat"
    id: montserrat_58
    size: 58
  - file: "gfonts://Montserrat"
    id: montserrat_24
    size: 24

# LVGL configuration
lvgl:
  displays:
    - main_display
  rotation: 180    # FLIP DISPLAY change to 180° to flip display
  touchscreens:
    - touchscreen_id: my_touchscreen
  buffer_size: 25%
  log_level: INFO
  color_depth: 16
  bg_color: 0x000033
  
  on_idle:
    timeout: 30s
    then:
      - logger.log: 'LVGL is idle'
      - globals.set:
          id: display_on
          value: 'false'
      - globals.set:
          id: ignore_touch
          value: 'true'
      # Hide the ring before sleep
      - lvgl.widget.hide: voice_ring
      - if:
          condition:
            lambda: 'return id(clock_mode);'
          then:
            # Clock mode enabled - show screensaver
            - logger.log: 'Entering clock screensaver mode'
            - globals.set:
                id: in_screensaver
                value: 'true'
            - lvgl.page.show: screensaver_page
            - light.turn_on:
                id: display_backlight
                brightness: 15%
                transition_length: 2s
          else:
            # Normal mode - turn off display
            - logger.log: 'Display going to sleep'
            - lvgl.pause:
            - light.turn_off:
                id: display_backlight
                transition_length: 5s
  
  style_definitions:
    - id: style_title
      text_font: montserrat_28
      text_color: 0xFFFFFF
    - id: style_body
      text_font: montserrat_20
      text_color: 0x00FF00
  
  # Top layer - voice status ring (visible on all pages)
  top_layer:
    widgets:
      # Outer ring indicator for voice assistant state
      - spinner:
          id: voice_ring
          align: CENTER
          width: 356
          height: 356
          arc_color: 0x003300
          arc_width: 6
          spin_time: 1500ms
          arc_length: 60
          indicator:
            arc_color: 0x00FF00
            arc_width: 6
          hidden: true
  
  pages:
    # Page 1: Home - Time, Weather, Voice Status
    - id: main_page
      widgets:
        # Time (big, top)
        - label:
            id: lbl_time
            align: TOP_MID
            y: 45
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text: "--:--"
        
        # Date (below time)
        - label:
            id: lbl_date
            align: TOP_MID
            y: 105
            text_font: montserrat_16
            text_color: 0xAAAAAA
            text: "--- -- ---"
        
        # Weather temperature
        - label:
            id: lbl_weather_temp
            align: CENTER
            y: -25
            text_font: montserrat_28
            text_color: 0x00BFFF
            text: "--°C"
        
        # Weather condition
        - label:
            id: lbl_weather_cond
            align: CENTER
            y: 10
            text_font: montserrat_16
            text_color: 0x87CEEB
            text: "Weather loading..."
        
        # Voice status
        - label:
            id: lbl_status
            align: CENTER
            y: 55
            text_font: montserrat_20
            text_color: 0x00FF00
            text: "Ready"
        
        # Wake word hint
        - label:
            align: BOTTOM_MID
            y: -45
            text_font: montserrat_14
            text_color: 0x666666
            text: "Say '${wake_word_phrase}'"
    
    # Page 2: Settings
    - id: settings_page
      widgets:
        - label:
            align: TOP_MID
            y: 50
            styles: style_title
            text: "Settings"
        
        # Clock Mode toggle
        - label:
            align: CENTER
            x: -60
            y: -20
            text_font: montserrat_20
            text_color: 0xFFFFFF
            text: "Clock Mode"
        
        - switch:
            id: clock_mode_switch
            align: CENTER
            x: 80
            y: -20
            width: 60
            height: 32
            bg_color: 0x333333
            indicator:
              bg_color: 0x00FF00
            on_click:
              then:
                - lambda: |-
                    bool new_state = lv_obj_has_state(id(clock_mode_switch), LV_STATE_CHECKED);
                    id(clock_mode) = new_state;
                    ESP_LOGI("settings", "Clock mode set to: %s", new_state ? "ON" : "OFF");
        
        # Description
        - label:
            align: CENTER
            y: 30
            text_font: montserrat_14
            text_color: 0x888888
            text: "Show time when idle"
        
        # Hint at bottom
        - label:
            align: BOTTOM_MID
            y: -45
            text_font: montserrat_14
            text_color: 0x666666
            text: "Swipe for more"
    
    # Page 3: Device Info
    - id: info_page
      widgets:
        - label:
            align: TOP_MID
            y: 50
            styles: style_title
            text: "Device Info"
        
        # Version
        - label:
            align: CENTER
            y: -60
            text_font: montserrat_16
            text_color: 0xAAAAAA
            text: "V${version}"
        
        # IP Address
        - label:
            id: lbl_ip
            align: CENTER
            y: -30
            text_font: montserrat_16
            text_color: 0x00FF00
            text: "IP: Connecting..."
        
        # WiFi Signal
        - label:
            id: lbl_wifi_signal
            align: CENTER
            y: 5
            text_font: montserrat_16
            text_color: 0x00FF00
            text: "WiFi: --"
        
        # Uptime
        - label:
            id: lbl_uptime
            align: CENTER
            y: 40
            text_font: montserrat_16
            text_color: 0x00FFFF
            text: "Uptime: --"
        
        - label:
            align: BOTTOM_MID
            y: -45
            text_font: montserrat_14
            text_color: 0x666666
            text: "Swipe for more"
    
    # Media Player page - COMMENTED OUT until ESP-IDF support is added
    # Uncomment this page when media_player component works with ESP-IDF
    # - id: media_page
    #   widgets:
    #     - label:
    #         align: TOP_MID
    #         y: 50
    #         styles: style_title
    #         text: "Media Player"
    #     - label:
    #         align: CENTER
    #         text_font: montserrat_16
    #         text_color: 0xFF6600
    #         text: "Not available\nwith ESP-IDF"
    
    # Screensaver page - Clock only (skip from normal navigation)
    - id: screensaver_page
      skip: true
      bg_color: 0x000000
      widgets:
        # Large centered time - bright white text (20% larger)
        - label:
            id: lbl_screensaver_time
            align: CENTER
            y: -25
            text_font: montserrat_58
            text_color: 0xFFFFFF
            text: "--:--"
        # Date below - brighter and larger
        - label:
            id: lbl_screensaver_date
            align: CENTER
            y: 45
            text_font: montserrat_24
            text_color: 0xDDDDDD
            text: "--- -- ---"
        # Wake word hint
        - label:
            align: BOTTOM_MID
            y: -50
            text_font: montserrat_14
            text_color: 0xFFFFFF
            text: "Say '${wake_word_phrase}'"

# Sensors
sensor:
  - platform: wifi_signal
    name: 'WiFi Signal'
    id: wifi_signal_sensor
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_wifi_signal
            text: !lambda 'return ("WiFi: " + std::to_string((int)x) + " dBm").c_str();'
  - platform: uptime
    name: 'Uptime'
    id: uptime_sensor
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_uptime
            text: !lambda |-
              int seconds = (int)x;
              int hours = seconds / 3600;
              int minutes = (seconds % 3600) / 60;
              return ("Uptime: " + std::to_string(hours) + "h " + std::to_string(minutes) + "m").c_str();

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: 'IP Address'
      id: wifi_ip
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_ip
              text_color: 0x00FF00
              text: !lambda 'return ("IP: " + x).c_str();'
    ssid:
      name: 'SSID'
    mac_address:
      name: 'MAC Address'
  - platform: template
    name: 'Display Text'
    id: display_text
    update_interval: never
  - platform: template
    name: 'Firmware Version'
    id: firmware_version
    icon: "mdi:tag"
    lambda: 'return {"${version}"};'
    update_interval: 3600s

# Button for restart
button:
  - platform: restart
    name: "Restart"
    id: restart_button
    icon: "mdi:restart"

# Switch for mute control from Home Assistant
switch:
  - platform: template
    name: 'Mute Voice Assistant'
    id: mute_switch
    icon: "mdi:microphone-off"
    lambda: 'return id(is_muted);'
    turn_on_action:
      - logger.log: "Muting via HA switch"
      - globals.set:
          id: is_muted
          value: 'true'
      - voice_assistant.stop:
      - lvgl.label.update:
          id: lbl_status
          text: "Muted"
          text_color: 0xFF6600
    turn_off_action:
      - logger.log: "Unmuting via HA switch"
      - globals.set:
          id: is_muted
          value: 'false'
      - lvgl.label.update:
          id: lbl_status
          text: "Ready"
          text_color: 0xFFFFFF
      - voice_assistant.start_continuous:
  
  - platform: template
    name: 'Clock Mode'
    id: clock_mode_ha_switch
    icon: "mdi:clock-outline"
    lambda: 'return id(clock_mode);'
    turn_on_action:
      - logger.log: "Enabling clock mode via HA"
      - globals.set:
          id: clock_mode
          value: 'true'
      - lvgl.widget.update:
          id: clock_mode_switch
          state:
            checked: true
    turn_off_action:
      - logger.log: "Disabling clock mode via HA"
      - globals.set:
          id: clock_mode
          value: 'false'
      - lvgl.widget.update:
          id: clock_mode_switch
          state:
            checked: false


